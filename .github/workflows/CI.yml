name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

env:
  # pyo3 0.22 predates Python 3.13/3.14; abi3 wheels are forward compatible, so allow
  # building against newer interpreters than pyo3 statically knows about.
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: '1'

jobs:
  # ---------- Fast PR feedback: cargo test on the zero-dep Rust core ----------
  rust-test:
    name: Rust core tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: cargo test (oa_core)
        run: cargo test --release -p oa_core --manifest-path rust/Cargo.toml

  # ---------- Build + import smoke test on Linux ----------
  smoke:
    name: Wheel smoke test (Linux)
    runs-on: ubuntu-latest
    needs: rust-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Install maturin
        run: pip install 'maturin>=1.7,<2.0'
      - name: Build the wheel
        run: maturin build --release --out dist -m rust/oa_py/Cargo.toml
      - name: Install the built wheel (+ runtime deps from PyPI)
        run: pip install dist/*.whl
      - name: Smoke test (no committed data needed)
        run: python benchmark/ci_smoke.py

  # ---------- Build abi3 wheels for all target platforms ----------
  build-wheels:
    name: Wheel ${{ matrix.target }}
    needs: rust-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,  manylinux: '2_28' }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu, manylinux: '2_28' }
          - { os: macos-14,       target: x86_64-apple-darwin }
          - { os: macos-14,       target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --out dist --interpreter '3.12' -m rust/oa_py/Cargo.toml
          sccache: 'true'
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: '1'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  # ---------- Build sdist ----------
  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    needs: rust-test
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist -m rust/oa_py/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ---------- Publish to PyPI on `v*` tag push via OIDC trusted publishing ----------
  publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [smoke, build-wheels, sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/openalgo
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: 'wheels-*'
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - name: List artifacts
        run: ls -la dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
